name: Feature request
description: Suggest an enhancement, metric addition, or documentation improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do, and why is current behavior insufficient?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, API, metric, or documentation change you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - FAIR data metrics
        - FRSM software metrics
        - Metadata harvesting
        - Identifier parsing
        - Reuse/license/access checks
        - Shiny app
        - Plumber API
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Link metric definitions, upstream F-UJI behavior, standards, examples, or related issues.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workarounds or alternative designs.
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I would be willing to help implement or test this.
          required: false
